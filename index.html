<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Property Guy — Content Calendar Months 2–4</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#F0D9A0;--gold-bg:#FDF8EC;--dark:#0F0F0F;--muted:#888;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F5F3EF;color:var(--dark);min-height:100vh}
.hdr{background:var(--dark);padding:24px 32px 20px;border-bottom:2px solid var(--gold)}
.hi{max-width:1200px;margin:0 auto}
.hdr h1{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:#fff}
.hdr h1 span{color:var(--gold)}
.hdr p{font-size:12px;color:var(--muted);margin-top:3px}
.chips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;border:.5px solid #333;color:var(--muted)}
.chip span{color:var(--gold);font-weight:500}
.layout{max-width:1200px;margin:0 auto;padding:22px 32px;display:flex;gap:20px;align-items:flex-start}
.sb{width:205px;flex-shrink:0;background:#fff;border-radius:var(--rl);border:1px solid #E2E2E2;overflow:hidden;position:sticky;top:16px;max-height:92vh;overflow-y:auto}
.sb-s{border-bottom:1px solid #F0F0F0;padding:7px 0}
.sb-s:last-child{border-bottom:none}
.sb-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:5px 12px 3px}
.sb-b{display:flex;align-items:center;width:100%;padding:7px 12px;background:none;border:none;text-align:left;font-size:11.5px;color:#444;cursor:pointer;font-family:'Inter',sans-serif;border-left:3px solid transparent;transition:background .1s}
.sb-b:hover{background:#F8F8F8}
.sb-b.act{background:var(--gold-bg);color:var(--dark);font-weight:500;border-left-color:var(--gold)}
.sb-c{margin-left:auto;font-size:9px;background:#F0F0F0;color:var(--muted);padding:1px 5px;border-radius:8px}
.sb-b.act .sb-c{background:var(--gold-l);color:#5A3800}
.main{flex:1;min-width:0}
.strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:7px;margin-bottom:1rem}
.sc{background:#fff;border:1px solid #E8E8E8;border-radius:var(--r);padding:9px 11px}
.sc-v{font-size:16px;font-weight:500;color:var(--dark)}
.sc-l{font-size:10px;color:var(--muted);margin-top:1px}
.mo-ban{background:var(--dark);color:var(--gold);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--r);margin-bottom:10px;display:inline-block}
.wk-h{margin-bottom:12px}
.wk-t{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--dark)}
.wk-f{font-size:12px;color:var(--muted);margin-top:2px}
.wk-tg{display:inline-block;margin-top:5px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px;background:var(--gold-bg);color:#5A3800;border:1px solid var(--gold-l)}
.dl{display:flex;flex-direction:column;gap:8px}
.dc{background:#fff;border:1px solid #E2E2E2;border-radius:var(--rl);overflow:hidden}
.dc:hover{border-color:#C8C8C8}
.dh{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none}
.dh:hover{background:#FAFAFA}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dn{font-size:12.5px;font-weight:500;color:var(--dark);min-width:80px}
.dt{font-size:11.5px;color:var(--muted);flex:1}
.pc{font-size:10px;padding:2px 7px;border-radius:7px;background:#F4F4F4;color:var(--muted);white-space:nowrap}
.cv{font-size:10px;color:#bbb;transition:transform .18s;margin-left:3px;flex-shrink:0}
.cv.op{transform:rotate(180deg)}
.db{display:none;border-top:1px solid #F0F0F0}
.db.op{display:block}
.pr{padding:10px 13px;border-bottom:.5px solid #F5F5F5}
.pr:last-child{border-bottom:none}
.pm{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.tb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:7px}
.to{background:#E3F5EE;color:#085041}
.tp{background:#FDF0D8;color:#633806}
.ft{font-size:10px;padding:2px 7px;border-radius:7px;background:#F4F4F4;color:#666}
.pt{font-size:12.5px;font-weight:500;color:var(--dark);margin-bottom:3px}
.pcp{font-size:11.5px;line-height:1.68;color:#444;white-space:pre-wrap}
.pcta{margin-top:4px;font-size:11px;color:#185FA5;font-weight:500;display:block}
.cpb{margin-top:5px;padding:4px 11px;font-size:10px;font-family:'Inter',sans-serif;background:#fff;border:1px solid #DDD;border-radius:5px;cursor:pointer;color:#666}
.cpb:hover{background:#F5F5F5}
.cpb.ok{color:#0F6E56;border-color:#0F6E56;background:#F0FBF7}
@media(max-width:700px){.layout{flex-direction:column;padding:12px}.sb{width:100%;position:static;max-height:none}.hdr{padding:16px}}
</style>
</head>
<body>
<div class="hdr"><div class="hi">
  <h1>The <span>Property Guy</span> — Content Calendar Months 2–4</h1>
  <p>Columbus, OH &nbsp;·&nbsp; Weeks 5–16 &nbsp;·&nbsp; Full posting schedule with paid ad strategy</p>
  <div class="chips">
    <div class="chip"><span>84</span> Days Covered</div>
    <div class="chip"><span>168+</span> Posts Scripted</div>
    <div class="chip"><span>12</span> Weeks</div>
    <div class="chip">Month 2 · Month 3 · Month 4</div>
    <div class="chip">500 → 50K Follower Growth Path</div>
  </div>
</div></div>
<div class="layout">
  <nav class="sb" id="sb"></nav>
  <main class="main" id="main"></main>
</div>

var M=[];
