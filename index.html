var aMid = "m2", aWid = "w5";

function buildNav(){
  var nav = document.getElementById('nav');
  nav.innerHTML = '';
  DATA.forEach(function(mo){
    var g = document.createElement('div'); g.className='ng';
    var l = document.createElement('div'); l.className='nl'; l.textContent=mo.mlabel; g.appendChild(l);
    mo.weeks.forEach(function(wk){
      var cnt = wk.days.reduce(function(a,d){return a+d.posts.length;},0);
      var b = document.createElement('button'); b.className='nb'+(wk.wid===aWid?' on':'');
      b.id='nb-'+wk.wid;
      b.innerHTML=wk.wlabel.split('—')[0]+'<span class="nc">'+cnt+'p</span>';
      b.onclick=(function(m,w){return function(){aMid=m.mid;aWid=w.wid;buildNav();render();};})(mo,wk);
      g.appendChild(b);
    });
    nav.appendChild(g);
  });
}

function render(){
  var mo=DATA.find(function(m){return m.mid===aMid;});
  var wk=mo.weeks.find(function(w){return w.wid===aWid;});
  var totalPosts=wk.days.reduce(function(a,d){return a+d.posts.length;},0);
  var paidDays=wk.days.filter(function(d){return d.posts.some(function(p){return p.type==='paid';});}).length;
  var stats=[
    {v:totalPosts+'',l:'Posts this week'},
    {v:paidDays+'d',l:'Days with paid ads'},
    {v:mo.mbudget,l:'Ad budget range'},
    {v:wk.wtarget,l:'Follower target'}
  ];
  var c=document.getElementById('content');
  c.innerHTML='<div class="stats">'+stats.map(function(s){return '<div class="st"><div class="stv">'+s.v+'</div><div class="stl">'+s.l+'</div></div>';}).join('')+'</div>'
    +'<div class="mban">'+mo.mlabel+' &nbsp;·&nbsp; '+mo.mfocus+'</div>'
    +'<div class="whead"><div class="wtitle">'+wk.wlabel+'</div><div class="wfocus">'+wk.wfocus+'</div><span class="wtarget">Target: '+wk.wtarget+'</span></div>'
    +'<div class="days" id="days"></div>';
  var dl=document.getElementById('days');
  wk.days.forEach(function(day){
    var dc=document.createElement('div'); dc.className='dcard';
    var ph=day.posts.map(function(p){
      var bc=p.type==='paid'?'bpaid':'borg';
      var bl=p.type==='paid'?'Paid Ad':'Organic';
      return '<div class="prow"><div class="pmeta"><span class="badge '+bc+'">'+p.time+' — '+bl+'</span><span class="fmtbadge">'+p.fmt+'</span></div>'
        +'<div class="ptitle">'+p.title+'</div>'
        +'<div class="pcap">'+p.cap+'</div>'
        +'<span class="pcta">CTA: '+p.cta+'</span>'
        +'<button class="cpbtn" onclick="cp(this,\''+encodeURIComponent(p.cap)+'\')">Copy caption</button>'
        +'</div>';
    }).join('');
    dc.innerHTML='<div class="dhdr" onclick="tog(this)">'
      +'<span class="dot" style="background:'+day.dot+'"></span>'
      +'<span class="dname">'+day.name+'</span>'
      +'<span class="dtheme">'+day.theme+'</span>'
      +'<span class="dcnt">'+day.posts.length+' post'+(day.posts.length>1?'s':'')+'</span>'
      +'<span class="chev">&#9660;</span>'
      +'</div><div class="dbody">'+ph+'</div>';
    dl.appendChild(dc);
  });
}

function tog(h){
  var b=h.nextElementSibling,cv=h.querySelector('.chev');
  var op=b.classList.contains('op');
  document.querySelectorAll('.dbody.op').forEach(function(e){e.classList.remove('op');});
  document.querySelectorAll('.chev.op').forEach(function(e){e.classList.remove('op');});
  if(!op){b.classList.add('op');cv.classList.add('op');}
}

function cp(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(function(){
    btn.textContent='Copied!';btn.classList.add('ok');
    setTimeout(function(){btn.textContent='Copy caption';btn.classList.remove('ok');},2000);
  });
}

buildNav(); render();
